name: Sync Release to GitHub

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/temmiland/pxWorlds/releases \
            --data "$(jq -n \
              --arg tag "${{ gitea.event.release.tag_name }}" \
              --arg name "${{ gitea.event.release.name }}" \
              --arg body "${{ gitea.event.release.body }}" \
              --argjson prerelease ${{ gitea.event.release.prerelease }} \
              '{tag_name: $tag, name: $name, body: $body, prerelease: $prerelease}')"